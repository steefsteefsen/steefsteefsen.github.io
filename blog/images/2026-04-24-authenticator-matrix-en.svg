<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 640" role="img" aria-label="The three guardians of 2FA: Ente Auth, Bitwarden, and the KeePassXC gatekeeper" class="guardians-svg">
<title>The Three Guardians of 2FA 2026</title>
<desc>Cartoon with a duck (Ente Auth), a Warden (Bitwarden), and a gatekeeper (KeePassXC) turning away the rejected apps Authy, LastPass, Raivo OTP, and Tofu.</desc>
<rect x="0" y="0" width="680" height="640" fill="#faf7f0"/>
<style>
.t_title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 22px; font-weight: 500; fill: #1a1a1a; }
.t_sub { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; fill: #5a5a5a; }
.t_lbl { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 500; fill: #1a1a1a; }
.t_tiny { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 11px; fill: #5a5a5a; }
.t_spch { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 16px; font-weight: 500; fill: #3a2a08; }
.t_rej { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; font-weight: 500; fill: #8b2323; }
.t_tag { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; font-weight: 500; fill: #5a5a5a; }
.t_qk { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 12px; font-weight: 500; fill: #6b5b2e; font-style: italic; }
</style>
<text x="340" y="38" class="t_title" text-anchor="middle">The Three Guardians of 2FA</text>
<text x="340" y="60" class="t_sub" text-anchor="middle">A little duck, a Warden, a gatekeeper — April 2026</text>

<g id="speech-bubble">
  <path d="M 330 108 Q 330 96 344 96 L 620 96 Q 634 96 634 108 L 634 160 Q 634 172 620 172 L 430 172 L 440 196 L 412 172 L 344 172 Q 330 172 330 160 Z" fill="#fffbf0" stroke="#8b6f1a" stroke-width="1.5"/>
  <text x="482" y="128" class="t_spch" text-anchor="middle">„You shall not pass!"</text>
  <text x="482" y="152" class="t_tiny" text-anchor="middle" style="fill: #6b5b2e;">— to Authy, LastPass, Raivo OTP, Tofu</text>
</g>

<line x1="40" y1="420" x2="640" y2="420" stroke="#c0c0c0" stroke-width="0.5" stroke-dasharray="2,3"/>

<g transform="translate(150, 350)"><g id="guardian-duck">
  <text id="duck-quack" x="-70" y="-50" class="t_qk" opacity="0">„Quack!"</text>
  <ellipse cx="0" cy="30" rx="55" ry="42" fill="#f4c430" stroke="#c9a032" stroke-width="1.5"/>
  <path d="M -5 18 Q 10 10 32 22 Q 28 42 8 38 Z" fill="#e0b02a" stroke="#c9a032" stroke-width="1"/>
  <g id="duck-head">
    <circle cx="-30" cy="-12" r="28" fill="#f4c430" stroke="#c9a032" stroke-width="1.5"/>
    <path d="M -30 -35 Q -20 -42 -18 -36" fill="none" stroke="#c9a032" stroke-width="1.5" stroke-linecap="round"/>
    <g id="duck-eye">
      <circle cx="-24" cy="-16" r="4.5" fill="white" stroke="#2c2c2c" stroke-width="1"/>
      <circle cx="-23" cy="-15" r="2.5" fill="#2c2c2c"/>
      <circle cx="-22" cy="-16" r="0.8" fill="white"/>
    </g>
    <g id="duck-beak">
      <path d="M -56 -8 Q -68 -4 -56 4 Q -48 0 -48 -4 Z" fill="#ff8c42" stroke="#d66a28" stroke-width="1"/>
      <path d="M -56 -2 Q -50 0 -48 -2" fill="none" stroke="#d66a28" stroke-width="0.8"/>
    </g>
  </g>
  <path d="M -12 68 L -12 82 L -22 82 M -12 82 L -2 82" stroke="#ff8c42" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M 12 68 L 12 82 L 2 82 M 12 82 L 22 82" stroke="#ff8c42" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <g transform="translate(42, 14)">
    <path d="M 0 -16 L 18 -11 L 18 6 Q 18 18 0 22 Q -18 18 -18 6 L -18 -11 Z" fill="#e8e4d4" stroke="#6b5b2e" stroke-width="1.5"/>
    <rect x="-5" y="-1" width="10" height="9" rx="1.5" fill="#6b5b2e"/>
    <path d="M -3 -1 v-4 a3 3 0 0 1 6 0 v4" fill="none" stroke="#6b5b2e" stroke-width="1.5"/>
    <circle cx="0" cy="4" r="1.2" fill="#e8e4d4"/>
  </g>
</g></g>

<g transform="translate(340, 300)"><g id="guardian-warden">
  <path d="M -24 -58 Q -24 -72 0 -72 Q 24 -72 24 -58 L 24 -48 L -24 -48 Z" fill="#175ddc" stroke="#0f4296" stroke-width="1.5"/>
  <rect x="-26" y="-48" width="52" height="6" fill="#0f4296"/>
  <path d="M 0 -66 L 6 -63 L 6 -56 Q 6 -52 0 -50 Q -6 -52 -6 -56 L -6 -63 Z" fill="#f4c430" stroke="#0f4296" stroke-width="1"/>
  <circle cx="0" cy="-28" r="20" fill="#f4d0b4" stroke="#c99a7a" stroke-width="1"/>
  <circle cx="-7" cy="-30" r="2" fill="#2c2c2c"/>
  <circle cx="7" cy="-30" r="2" fill="#2c2c2c"/>
  <circle cx="-6.5" cy="-30.5" r="0.6" fill="white"/>
  <circle cx="7.5" cy="-30.5" r="0.6" fill="white"/>
  <path d="M -6 -18 Q 0 -14 6 -18" fill="none" stroke="#2c2c2c" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M -8 -23 Q -4 -21 0 -22 Q 4 -21 8 -23" fill="none" stroke="#5c3c1c" stroke-width="2" stroke-linecap="round"/>
  <path d="M -30 -10 L -30 82 L 30 82 L 30 -10 Q 22 -14 16 -11 Q 10 -6 0 -6 Q -10 -6 -16 -11 Q -22 -14 -30 -10 Z" fill="#175ddc" stroke="#0f4296" stroke-width="1.5"/>
  <g id="warden-buttons">
    <circle cx="0" cy="8" r="2" fill="#f4c430"/>
    <circle cx="0" cy="26" r="2" fill="#f4c430"/>
    <circle cx="0" cy="44" r="2" fill="#f4c430"/>
  </g>
  <rect x="-30" y="56" width="60" height="9" fill="#0f4296"/>
  <rect x="-7" y="56" width="14" height="9" fill="#f4c430" stroke="#0f4296" stroke-width="0.5"/>
  <path d="M -30 -10 L -52 28 L -42 38 L -22 6 Z" fill="#175ddc" stroke="#0f4296" stroke-width="1.5"/>
  <g id="warden-arm-right" style="transform-box: fill-box; transform-origin: 30px -10px;">
    <path d="M 30 -10 L 52 28 L 42 38 L 22 6 Z" fill="#175ddc" stroke="#0f4296" stroke-width="1.5"/>
    <circle cx="47" cy="40" r="7" fill="#f4d0b4" stroke="#c99a7a" stroke-width="1"/>
  </g>
  <circle cx="-47" cy="40" r="7" fill="#f4d0b4" stroke="#c99a7a" stroke-width="1"/>
  <g transform="translate(-53, 56)"><g id="warden-shield">
    <path d="M 0 -18 L 22 -12 L 22 6 Q 22 22 0 28 Q -22 22 -22 6 L -22 -12 Z" fill="#175ddc" stroke="#0f4296" stroke-width="1.5"/>
    <path d="M -12 -5 L 0 -10 L 12 -5 L 12 5 Q 12 14 0 18 Q -12 14 -12 5 Z" fill="#f4c430" stroke="#175ddc" stroke-width="1"/>
    <text x="0" y="10" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#175ddc">b</text>
  </g></g>
</g></g>

<g transform="translate(530, 300)"><g id="guardian-gatekeeper">
  <path d="M 0 -18 L -52 82 L 52 82 Z" fill="#3d2e5a" stroke="#2a1f40" stroke-width="1.5"/>
  <path d="M -32 42 L 32 42" stroke="#5e4a82" stroke-width="2.5"/>
  <circle cx="-14" cy="60" r="3" fill="#5e4a82"/>
  <circle cx="14" cy="60" r="3" fill="#5e4a82"/>
  <ellipse cx="0" cy="-30" rx="18" ry="20" fill="#f4d0b4" stroke="#c99a7a" stroke-width="1"/>
  <path d="M -24 -44 Q -24 -22 -18 -12 L 18 -12 Q 24 -22 24 -44 Q 24 -64 0 -64 Q -24 -64 -24 -44 Z" fill="#3d2e5a" stroke="#2a1f40" stroke-width="1.5"/>
  <path d="M -16 -38 Q -16 -20 -10 -12 L 10 -12 Q 16 -20 16 -38 Q 16 -54 0 -54 Q -16 -54 -16 -38 Z" fill="#1a1230" opacity="0.55"/>
  <circle cx="-5" cy="-34" r="2.2" fill="#7ac5ff"/>
  <circle cx="5" cy="-34" r="2.2" fill="#7ac5ff"/>
  <path d="M -8 -18 Q 0 -8 8 -18 Q 6 -10 0 -6 Q -6 -10 -8 -18 Z" fill="#d5d5cc" stroke="#9999a0" stroke-width="0.5"/>
  <path d="M -18 -4 Q -48 -18 -56 -48" stroke="#3d2e5a" stroke-width="11" fill="none" stroke-linecap="round"/>
  <circle cx="-56" cy="-52" r="11" fill="#f4d0b4" stroke="#c99a7a" stroke-width="1"/>
  <path d="M -62 -58 L -62 -48 M -58 -60 L -58 -46 M -54 -60 L -54 -46 M -50 -58 L -50 -48" stroke="#c99a7a" stroke-width="1" stroke-linecap="round"/>
  <path d="M 20 -4 L 42 28" stroke="#3d2e5a" stroke-width="11" fill="none" stroke-linecap="round"/>
  <g id="gatekeeper-staff" style="transform-box: fill-box; transform-origin: 46px 72px;">
    <line x1="56" y1="-78" x2="46" y2="72" stroke="#6b4a2a" stroke-width="3.2" stroke-linecap="round"/>
    <g id="gatekeeper-lantern">
      <circle cx="56" cy="-78" r="14" fill="#7ac5ff" opacity="0.25"/>
      <circle cx="56" cy="-78" r="8" fill="#7ac5ff" opacity="0.95"/>
      <circle cx="54" cy="-80" r="2.5" fill="#ffffff" opacity="0.8"/>
      <g stroke="#7ac5ff" stroke-width="1.2" stroke-linecap="round">
        <line x1="40" y1="-88" x2="42" y2="-84"/>
        <line x1="72" y1="-72" x2="68" y2="-70"/>
        <line x1="48" y1="-60" x2="50" y2="-64"/>
      </g>
    </g>
  </g>
</g></g>

<text x="150" y="448" class="t_lbl" text-anchor="middle">Ente Auth</text>
<text x="150" y="464" class="t_tiny" text-anchor="middle">Quack-proof · Cure53 × 2</text>
<text x="340" y="448" class="t_lbl" text-anchor="middle">The Warden</text>
<text x="340" y="464" class="t_tiny" text-anchor="middle">Sync toggle OFF · mandatory</text>
<text x="530" y="448" class="t_lbl" text-anchor="middle">The Gatekeeper</text>
<text x="530" y="464" class="t_tiny" text-anchor="middle">KeePassXC · self-hosted</text>

<g id="rejected-cards" transform="translate(40, 484)">
  <g transform="translate(75, 24) rotate(-9)"><g class="rejected" data-dir="left">
    <rect x="-30" y="-13" width="60" height="26" rx="4" fill="#fce4e4" stroke="#c94444" stroke-width="1"/>
    <line x1="-24" y1="-8" x2="-18" y2="-2" stroke="#c94444" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-18" y1="-8" x2="-24" y2="-2" stroke="#c94444" stroke-width="1.2" stroke-linecap="round"/>
    <text x="4" y="4" class="t_rej" text-anchor="middle">Authy</text>
  </g></g>
  <g transform="translate(220, 12) rotate(6)"><g class="rejected" data-dir="left-up">
    <rect x="-36" y="-13" width="72" height="26" rx="4" fill="#fce4e4" stroke="#c94444" stroke-width="1"/>
    <line x1="-30" y1="-8" x2="-24" y2="-2" stroke="#c94444" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-24" y1="-8" x2="-30" y2="-2" stroke="#c94444" stroke-width="1.2" stroke-linecap="round"/>
    <text x="4" y="4" class="t_rej" text-anchor="middle">LastPass</text>
  </g></g>
  <g transform="translate(370, 28) rotate(-4)"><g class="rejected" data-dir="right-up">
    <rect x="-36" y="-13" width="72" height="26" rx="4" fill="#fce4e4" stroke="#c94444" stroke-width="1"/>
    <line x1="-30" y1="-8" x2="-24" y2="-2" stroke="#c94444" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-24" y1="-8" x2="-30" y2="-2" stroke="#c94444" stroke-width="1.2" stroke-linecap="round"/>
    <text x="4" y="4" class="t_rej" text-anchor="middle">Raivo OTP</text>
  </g></g>
  <g transform="translate(515, 22) rotate(-7)"><g class="rejected" data-dir="right">
    <rect x="-24" y="-13" width="48" height="26" rx="4" fill="#fce4e4" stroke="#c94444" stroke-width="1"/>
    <line x1="-18" y1="-8" x2="-12" y2="-2" stroke="#c94444" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-12" y1="-8" x2="-18" y2="-2" stroke="#c94444" stroke-width="1.2" stroke-linecap="round"/>
    <text x="4" y="4" class="t_rej" text-anchor="middle">Tofu</text>
  </g></g>
</g>

<rect x="240" y="566" width="200" height="32" rx="16" fill="#f0ece0" stroke="#c9c4b4" stroke-width="0.5"/>
<text x="340" y="586" class="t_tag" text-anchor="middle">@steefsteefsen  ·  April 2026</text>
</svg>
