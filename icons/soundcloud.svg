<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 36" aria-hidden="true">
  <!-- Vertical waveform bars (left-to-right rising amplitude) -->
  <g fill="#000000">
    <rect x="2"  y="22" width="2.2" height="6"  rx="1"/>
    <rect x="6"  y="18" width="2.2" height="14" rx="1"/>
    <rect x="10" y="14" width="2.2" height="20" rx="1"/>
    <rect x="14" y="11" width="2.2" height="24" rx="1"/>
    <rect x="18" y="9"  width="2.2" height="26" rx="1"/>
    <rect x="22" y="11" width="2.2" height="22" rx="1"/>
    <rect x="26" y="14" width="2.2" height="18" rx="1"/>
  </g>
  <!-- Cloud body on the right (rounded blob silhouette) -->
  <path fill="#000000" d="
    M 32 12
    C 34 8, 39 6, 43 8
    C 46 4, 53 4, 56 9
    C 61 9, 64 13, 64 18
